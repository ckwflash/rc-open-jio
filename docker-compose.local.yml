services:
  postgres:
    image: postgres:16-alpine
    container_name: rc-open-jio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rc_open_jio
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rc_open_jio"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - rc_open_jio_pgdata:/var/lib/postgresql/data

volumes:
  rc_open_jio_pgdata:
